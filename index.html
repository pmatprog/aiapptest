<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Newsletter Desk</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Newsletter editor">
        <header class="topbar">
          <div>
            <p class="kicker">Issue Desk</p>
            <h1>AI Newsletter</h1>
          </div>
          <div class="actions">
            <button class="icon-button" id="saveDraft" type="button" title="Save draft" aria-label="Save draft">
              <span aria-hidden="true">S</span>
            </button>
            <button class="icon-button" id="copyMarkdown" type="button" title="Copy markdown" aria-label="Copy markdown">
              <span aria-hidden="true">C</span>
            </button>
            <button class="primary-action" id="downloadMarkdown" type="button">Export</button>
          </div>
        </header>

        <section class="editor-grid">
          <aside class="panel controls" aria-label="Issue controls">
            <label>
              Issue title
              <input id="issueTitle" type="text" value="This Week in Practical AI">
            </label>
            <label>
              Audience
              <select id="audience">
                <option>Product builders</option>
                <option>Engineering leaders</option>
                <option>Startup operators</option>
                <option>Curious executives</option>
              </select>
            </label>
            <label>
              Voice
              <select id="voice">
                <option>Clear and pragmatic</option>
                <option>Brief and punchy</option>
                <option>Analytical and calm</option>
                <option>Founder-to-founder</option>
              </select>
            </label>
            <label>
              Publish date
              <input id="publishDate" type="date">
            </label>
            <label>
              Sponsor note
              <textarea id="sponsor" rows="4" placeholder="Optional sponsor copy"></textarea>
            </label>
          </aside>

          <section class="panel story-panel" aria-label="Story queue">
            <div class="section-heading">
              <div>
                <p class="kicker">Queue</p>
                <h2>Stories</h2>
              </div>
              <button class="secondary-action" id="addStory" type="button">Add</button>
            </div>
            <div id="storyList" class="story-list"></div>
          </section>

          <section class="panel preview-panel" aria-label="Newsletter preview">
            <div class="section-heading">
              <div>
                <p class="kicker">Preview</p>
                <h2>Markdown</h2>
              </div>
              <output id="saveStatus" aria-live="polite"></output>
            </div>
            <pre id="preview"></pre>
          </section>
        </section>
      </section>
    </main>
    <script src="src/app.js"></script>
  </body>
</html>
